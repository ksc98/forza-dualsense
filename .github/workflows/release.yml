name: release

# Cargo.toml is the trigger. Push code freely; the workflow only
# actually builds + publishes when the version in Cargo.toml is new.
on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Decide whether to release
        id: decide
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          $cargo = Get-Content Cargo.toml -Raw
          if ($cargo -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            Write-Error "Could not parse 'version' from Cargo.toml"
            exit 1
          }
          $version = $Matches[1]
          $tag = "v$version"
          Write-Host "Cargo.toml version: $version -> tag $tag"

          $url = "https://api.github.com/repos/$env:REPO/releases/tags/$tag"
          $hdr = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "User-Agent" = "forza-dualsense-release"
          }
          $exists = $false
          try {
            Invoke-WebRequest -Uri $url -Headers $hdr -UseBasicParsing | Out-Null
            $exists = $true
          } catch {
            $code = $null
            try { $code = $_.Exception.Response.StatusCode.value__ } catch { }
            if ($code -ne 404) { throw }
          }

          if ($exists) {
            Write-Host "Release $tag already exists — nothing to do."
            "release=false" | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Release $tag is new — building."
            "release=true" | Out-File $env:GITHUB_OUTPUT -Append
          }
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append

      - uses: dtolnay/rust-toolchain@stable
        if: steps.decide.outputs.release == 'true'
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        if: steps.decide.outputs.release == 'true'

      - name: Build release
        if: steps.decide.outputs.release == 'true'
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        if: steps.decide.outputs.release == 'true'
        id: pkg
        shell: pwsh
        env:
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          $name = "forza-dualsense-$env:TAG-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/forza-dualsense.exe -Destination $name/
          Copy-Item README.md       -Destination $name/
          Copy-Item LICENSE-MIT     -Destination $name/
          Copy-Item LICENSE-APACHE  -Destination $name/
          Compress-Archive -Path "$name/*" -DestinationPath "$name.zip"
          "asset=$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish release
        if: steps.decide.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.decide.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.pkg.outputs.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
