name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Block two releases from running at once.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve tag
        id: tag
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Parse Cargo.toml — always the source of truth for the version.
          $cargo = Get-Content Cargo.toml -Raw
          if ($cargo -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            Write-Error "Could not parse 'version' from Cargo.toml"
            exit 1
          }
          $cargoVersion = $Matches[1]
          $derivedTag = "v$cargoVersion"

          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $t = $derivedTag
            Write-Host "workflow_dispatch — releasing Cargo.toml version $cargoVersion as $t"
          } else {
            $t = $env:REF_NAME
            if (-not ($t -match '^v\d+\.\d+\.\d+$')) {
              Write-Error "Pushed tag must look like 'vX.Y.Z', got '$t'"
              exit 1
            }
            if ($t -ne $derivedTag) {
              Write-Error "Pushed tag $t does not match Cargo.toml version $cargoVersion (expected $derivedTag). Bump Cargo.toml on main and re-tag."
              exit 1
            }
            Write-Host "push tag — releasing $t (Cargo.toml matches)"
          }
          "tag=$t" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Refuse to re-release an existing tag
        shell: pwsh
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          $url = "https://api.github.com/repos/$env:REPO/releases/tags/$env:TAG"
          $hdr = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json"; "User-Agent" = "forza-dualsense-release" }
          try {
            Invoke-WebRequest -Uri $url -Headers $hdr -UseBasicParsing | Out-Null
            Write-Error "Release $env:TAG already exists. Bump the version in Cargo.toml and run again."
            exit 1
          } catch {
            $code = $null
            try { $code = $_.Exception.Response.StatusCode.value__ } catch { }
            if ($code -eq 404) {
              Write-Host "Tag $env:TAG is fresh — proceeding."
            } else {
              throw
            }
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        id: pkg
        shell: pwsh
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          $name = "forza-dualsense-$env:TAG-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/forza-dualsense.exe -Destination $name/
          Copy-Item README.md       -Destination $name/
          Copy-Item LICENSE-MIT     -Destination $name/
          Copy-Item LICENSE-APACHE  -Destination $name/
          Compress-Archive -Path "$name/*" -DestinationPath "$name.zip"
          "asset=$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.pkg.outputs.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
